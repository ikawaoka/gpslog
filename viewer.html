<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GPS Viewer</title>

  <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>

  <style>
    body { margin: 0; }
    #map { width: 100vw; height: 100vh; }
  </style>
</head>

<body>
<div id="map"></div>

<script>

const map = new maplibregl.Map({
  container: "map",
  style: "https://tiles.openfreemap.org/styles/liberty",
  center: [0, 0],
  zoom: 2
});

async function loadGPS() {

  // ----------------------------
  // index.json 読み込み
  // ----------------------------
  const indexRes = await fetch("./index.json");
  const index = await indexRes.json();

  console.log("latest:", index.latest);
  console.log("files:", index.files.length);

  let allCoords = [];

  // ----------------------------
  // 全ファイル読み込み
  // ----------------------------
  for (const file of index.files) {

    const res = await fetch("./" + file);
    if (!res.ok) {
      continue;
    }
    const text = await res.text();

    const records = text
      .trim()
      .split("\n")
      .filter(l => l.length > 0)
      .map(l => JSON.parse(l));

    const coords = records
      .reverse()
      .map(r => [Number(r.lo), Number(r.la)])
      .filter(c => Number.isFinite(c[0]) && Number.isFinite(c[1]));

    allCoords = allCoords.concat(coords);
  }

  console.log("total coords:", allCoords.length);

  if (allCoords.length < 2) {
    console.log("no data");
    return;
  }

map.on("load", () => {

  if (!allCoords || allCoords.length < 2) return;

  // ----------------------------
  // safe coords
  // ----------------------------
  const safeCoords = allCoords.filter(c =>
    Array.isArray(c) &&
    c.length === 2 &&
    Number.isFinite(c[0]) &&
    Number.isFinite(c[1])
  );

  // ----------------------------
  // distance function
  // ----------------------------
  function haversine(a, b) {
    const R = 6371000;
    const toRad = x => x * Math.PI / 180;

    const dLat = toRad(b[1] - a[1]);
    const dLon = toRad(b[0] - a[0]);

    const lat1 = toRad(a[1]);
    const lat2 = toRad(b[1]);

    const h =
      Math.sin(dLat / 2) ** 2 +
      Math.cos(lat1) * Math.cos(lat2) *
      Math.sin(dLon / 2) ** 2;

    return 2 * R * Math.asin(Math.sqrt(h));
  }

  // ----------------------------
  // segment split
  // ----------------------------
  function splitSegments(coords, threshold = 100) {
    const segments = [];
    let current = [];

    for (let i = 0; i < coords.length; i++) {

      const p = coords[i];

      if (current.length === 0) {
        current.push(p);
        continue;
      }

      const prev = current[current.length - 1];
      const dist = haversine(prev, p);

      if (dist > threshold) {
        if (current.length >= 2) {
          segments.push(current);
        }
        current = [p];
      } else {
        current.push(p);
      }
    }

    if (current.length >= 2) {
      segments.push(current);
    }

    return segments;
  }

  const segments = splitSegments(safeCoords, 100).filter(seg => seg.length >= 6);

  console.log("segments:", segments.length);

  // ----------------------------
  // route source（MultiLineString）
  // ----------------------------
  map.addSource("route", {
    type: "geojson",
    data: {
      type: "Feature",
      geometry: {
        type: "MultiLineString",
        coordinates: segments
      }
    }
  });

  // ----------------------------
  // line
  // ----------------------------
  map.addLayer({
    id: "route-line",
    type: "line",
    source: "route",
    paint: {
      "line-color": "#00d4ff",
      "line-width": 4
    }
  });

  // ----------------------------
  // points（セグメント単位でフィルタ）
  // ----------------------------
  const flatPoints = segments.flat().filter((p, i, arr) => {
    if (i === 0 || i === arr.length - 1) return true;

    const prev = arr[i - 1];
    const next = arr[i + 1];

    const d1 = haversine(prev, p);
    const d2 = haversine(p, next);

    return !(d1 > 100 && d2 > 100);
  });

  map.addSource("points", {
    type: "geojson",
    data: {
      type: "Feature",
      geometry: {
        type: "MultiPoint",
        coordinates: flatPoints
      }
    }
  });

  map.addLayer({
    id: "route-points",
    type: "circle",
    source: "points",
    paint: {
      "circle-radius": 3,
      "circle-color": "#ff3b30"
    }
  });

  const bounds = new maplibregl.LngLatBounds();
  segments.forEach(seg => {
    seg.forEach(c => bounds.extend(c));
  });

  map.fitBounds(bounds, {
    padding: 60,
    duration: 0
  });
});
}

loadGPS();

</script>
</body>
</html>
