<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GPS Viewer</title>

  <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>

  <style>
    body { margin: 0; }
    #map { width: 100vw; height: 100vh; }
  </style>
</head>

<body>
<div id="map"></div>

<script>

const map = new maplibregl.Map({
  container: "map",
  style: "https://tiles.openfreemap.org/styles/liberty",
  center: [0, 0],
  zoom: 2
});

async function loadGPS() {

  // ----------------------------
  // index.json 読み込み
  // ----------------------------
  const indexRes = await fetch("./index.json");
  const index = await indexRes.json();

  console.log("latest:", index.latest);
  console.log("files:", index.files.length);

  let allCoords = [];

  // ----------------------------
  // 全ファイル読み込み
  // ----------------------------
  for (const file of index.files) {

    const res = await fetch("./" + file);
    const text = await res.text();

    const records = text
      .trim()
      .split("\n")
      .filter(l => l.length > 0)
      .map(l => JSON.parse(l));

    const coords = records
      .map(r => [Number(r.lo), Number(r.la)])
      .filter(c => Number.isFinite(c[0]) && Number.isFinite(c[1]));

    allCoords = allCoords.concat(coords);
  }

  console.log("total coords:", allCoords.length);

  if (allCoords.length < 2) {
    console.log("no data");
    return;
  }

  map.on("load", () => {

    // ----------------------------
    // route source
    // ----------------------------
    map.addSource("route", {
      type: "geojson",
      data: {
        type: "Feature",
        geometry: {
          type: "LineString",
          coordinates: allCoords
        }
      }
    });

    // ----------------------------
    // line layer
    // ----------------------------
    map.addLayer({
      id: "route-line",
      type: "line",
      source: "route",
      paint: {
        "line-color": "#00d4ff",
        "line-width": 5,
        "line-opacity": 0.9
      }
    });

    // ----------------------------
    // points
    // ----------------------------
    map.addLayer({
      id: "route-points",
      type: "circle",
      source: "route",
      paint: {
        "circle-radius": 3,
        "circle-color": "#ff3b30",
        "circle-stroke-width": 1,
        "circle-stroke-color": "#ffffff"
      }
    });

    // ----------------------------
    // auto fit
    // ----------------------------
    const bounds = allCoords.reduce((b, c) => {
      return b.extend(c);
    }, new maplibregl.LngLatBounds(allCoords[0], allCoords[0]));

    map.fitBounds(bounds, {
      padding: 60,
      duration: 0
    });

    // ----------------------------
    // markers
    // ----------------------------
    new maplibregl.Marker({ color: "green" })
      .setLngLat(allCoords[0])
      .addTo(map);

    new maplibregl.Marker({ color: "red" })
      .setLngLat(allCoords[allCoords.length - 1])
      .addTo(map);

  });
}

loadGPS();

</script>
</body>
</html>
