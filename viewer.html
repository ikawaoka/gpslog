<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GPS Viewer</title>

  <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>

  <style>
    body { margin: 0; }
    #map { width: 100vw; height: 100vh; }
  </style>
</head>

<body>
<div id="map"></div>

<script>

async function loadGPS() {

  // ----------------------------
  // index.json 読み込み
  // ----------------------------
  const indexRes = await fetch("./index.json");
  const index = await indexRes.json();

  console.log("latest:", index.latest);
  console.log("files:", index.files.length);

  let allCoords = [];

  // ----------------------------
  // 全ファイル読み込み
  // ----------------------------
  for (const file of index.files) {

    const res = await fetch("./" + file);
    if (!res.ok) {
      continue;
    }
    const text = await res.text();

    const records = text
      .trim()
      .split("\n")
      .filter(l => l.length > 0)
      .map(l => JSON.parse(l));

    const coords = records
      .reverse()
      .map(r => [Number(r.lo), Number(r.la)])
      .filter(c => Number.isFinite(c[0]) && Number.isFinite(c[1]));

    allCoords = allCoords.concat(coords);
  }

  console.log("total coords:", allCoords.length);

  if (allCoords.length < 2) {
    console.log("no data");
    return;
  }

  if (!allCoords || allCoords.length < 2) return;

  // ----------------------------
  // start, goal parameter
  // ----------------------------
  const params = new URLSearchParams(location.search);
  const start = parseInt(params.get("start"), 10);
  const goal = parseInt(params.get("goal"), 10);

  // ----------------------------
  // safe coords
  // ----------------------------
  let safeCoords = allCoords.filter(c =>
    Array.isArray(c) &&
    c.length === 2 &&
    Number.isFinite(c[0]) &&
    Number.isFinite(c[1])
  );

  // ----------------------------
  // newest N start〜goal、0は最新、スタートだけ指定可能。goalをマイナスで指定すると最古のデータから|goal|点数まで取る。
  // ----------------------------
  if (Number.isFinite(start) && start > 0) {
    safeCoords = safeCoords.slice(goal,start);

    console.log("goal:", goal);
    console.log("start:", start);
    console.log("filtered coords:", safeCoords.length);
  } else if (Number.isFinite(goal) && goal > 0) {
    safeCoords = safeCoords.slice(goal);

    console.log("goal:", goal);
    console.log("start:", start);
    console.log("filtered coords:", safeCoords.length);
  } else if (Number.isFinite(goal) && goal < 0) {
    safeCoords = safeCoords.slice(goal);

    console.log("goal:", goal);
    console.log("start:", start);
    console.log("filtered coords:", safeCoords.length);
  }

  // ----------------------------
  // distance function
  // ----------------------------
  function haversine(a, b) {
    const R = 6371000;
    const toRad = x => x * Math.PI / 180;

    const dLat = toRad(b[1] - a[1]);
    const dLon = toRad(b[0] - a[0]);

    const lat1 = toRad(a[1]);
    const lat2 = toRad(b[1]);

    const h =
      Math.sin(dLat / 2) ** 2 +
      Math.cos(lat1) * Math.cos(lat2) *
      Math.sin(dLon / 2) ** 2;

    return 2 * R * Math.asin(Math.sqrt(h));
  }

  // ----------------------------
  // segment split
  // ----------------------------
  function splitSegments(coords, threshold = 100) {
    const segments = [];
    let current = [];

    for (let i = 0; i < coords.length; i++) {

      const p = coords[i];

      if (current.length === 0) {
        current.push(p);
        continue;
      }

      const prev = current[current.length - 1];
      const dist = haversine(prev, p);

      if (dist > threshold) {
        if (current.length >= 2) {
          segments.push(current);
        }
        current = [p];
      } else {
        current.push(p);
      }
    }

    if (current.length >= 2) {
      segments.push(current);
    }

    return segments;
  }

  function segmentSizeOk(seg, minMeters = 1) { //同一点が集中していたらFalse

    let minLat = Infinity, maxLat = -Infinity;
    let minLon = Infinity, maxLon = -Infinity;

    for (const [lon, lat] of seg) {
      if (lon < minLon) minLon = lon;
      if (lon > maxLon) maxLon = lon;
      if (lat < minLat) minLat = lat;
      if (lat > maxLat) maxLat = lat;
    }

    // 中心緯度でメートル換算
    const avgLat = (minLat + maxLat) / 2;
    const latMeter = 111320;
    const lonMeter = 111320 * Math.cos(avgLat * Math.PI / 180);

    const width = (maxLon - minLon) * lonMeter;
    const height = (maxLat - minLat) * latMeter;

    return Math.max(width, height) >= minMeters;
  }

  const segments = splitSegments(safeCoords, 100).filter(seg => seg.length >= 100 || segmentSizeOk(seg,1));

  console.log("segments:", segments.length);

  const bounds = new maplibregl.LngLatBounds();
  segments.forEach(seg => {
    seg.forEach(c => bounds.extend(c));
  });

const map = new maplibregl.Map({
  container: "map",
  style: "https://tiles.openfreemap.org/styles/liberty",
//  center: [0, 0],
//  zoom: 2
  bounds: bounds,
});

  map.fitBounds(bounds, {
    padding: 60,
    duration: 0
  });

map.on("load", () => {

  // ----------------------------
  // route source
  // ----------------------------
  map.addSource("route", {
    type: "geojson",
    data: {
      type: "FeatureCollection",
      features: segments.map(seg => ({
        type: "Feature",
        geometry: {
          type: "LineString",
          coordinates: seg
        }
      }))
    }
  });

  // ----------------------------
  // route line
  // ----------------------------
  map.addLayer({
    id: "route-line",
    type: "line",
    source: "route",
    paint: {
      "line-color": "#00d4ff",
      "line-width": 4,
      "line-opacity": 0.9,
      "line-blur": 0.5
    }
  });

  // ----------------------------
  // route points
  // ----------------------------
  map.addLayer({
    id: "route-points",
    type: "circle",
    source: "route",
    paint: {
      "circle-radius": 3,
      "circle-color": "#ff3b30",
      "circle-stroke-width": 1,
      "circle-stroke-color": "#ffffff"
    }
  });

  // ----------------------------
  // start marker
  // ----------------------------
  const firstCoord = segments[0][0];

  new maplibregl.Marker({ color: "green" })
    .setLngLat(firstCoord)
    .addTo(map);

  // ----------------------------
  // end marker
  // ----------------------------
  const lastSeg = segments[segments.length - 1];
  const lastCoord = lastSeg[lastSeg.length - 1];

  new maplibregl.Marker({ color: "red" })
    .setLngLat(lastCoord)
    .addTo(map);

});
}

loadGPS();

</script>
</body>
</html>
