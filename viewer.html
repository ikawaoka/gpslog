<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GPS Viewer</title>

  <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>

  <style>
    body { margin: 0; }
    #map { width: 100vw; height: 100vh; }
  </style>
</head>

<body>
<div id="map"></div>

<script>

// ----------------------------
// MAP INIT（center固定なし）
// ----------------------------
const map = new maplibregl.Map({
  container: "map",
  style: "https://tiles.openfreemap.org/styles/liberty",
  center: [0, 0], // 仮（後でfitBoundsで必ず移動）
  zoom: 2
});

// ----------------------------
// LOAD GPS
// ----------------------------
async function loadGPS() {

  const res = await fetch("./000000001.jsonl");
  const text = await res.text();

  const records = text
    .trim()
    .split("\n")
    .filter(l => l.length > 0)
    .map(l => JSON.parse(l));

  console.log("records:", records.length);

  const coords = records
    .map(r => [Number(r.lo), Number(r.la)])
    .filter(c => Number.isFinite(c[0]) && Number.isFinite(c[1]));

  console.log("coords:", coords.length);

  if (coords.length < 2) {
    console.log("Not enough points");
    return;
  }

  map.on("load", () => {

    // ----------------------------
    // ROUTE SOURCE
    // ----------------------------
    map.addSource("route", {
      type: "geojson",
      data: {
        type: "Feature",
        geometry: {
          type: "LineString",
          coordinates: coords
        }
      }
    });

    // ----------------------------
    // ROUTE LINE（豪華版）
    // ----------------------------
    map.addLayer({
      id: "route-line",
      type: "line",
      source: "route",
      paint: {
        "line-color": "#00d4ff",
        "line-width": 5,
        "line-opacity": 0.9,
        "line-blur": 0.5
      }
    });

    // ----------------------------
    // POINTS
    // ----------------------------
    map.addLayer({
      id: "route-points",
      type: "circle",
      source: "route",
      paint: {
        "circle-radius": 3,
        "circle-color": "#ff3b30",
        "circle-stroke-width": 1,
        "circle-stroke-color": "#ffffff"
      }
    });

    // ----------------------------
    // AUTO FIT（中心完全自動）
    // ----------------------------
    const bounds = coords.reduce((b, c) => {
      return b.extend(c);
    }, new maplibregl.LngLatBounds(coords[0], coords[0]));

    map.fitBounds(bounds, {
      padding: 60,
      duration: 0
    });

    // ----------------------------
    // START / END MARKER
    // ----------------------------
    new maplibregl.Marker({ color: "green" })
      .setLngLat(coords[0])
      .addTo(map);

    new maplibregl.Marker({ color: "red" })
      .setLngLat(coords[coords.length - 1])
      .addTo(map);

  });
}

loadGPS();

</script>
</body>
</html>
